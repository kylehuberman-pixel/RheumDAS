        <script>

          // tooltipster
            $(document).ready(function() {

                var currentJoint;
                var currentJointID;
                var selectedState;

                $tooltipContent = $('#tooltip-content').html();
                var offsetXvalue = 0;
                var tooltipContent = $('<nav><a ');
                $('.joint').tooltipster({
                    animation: 'grow',
                    delay: 0,
                    speed: 200,
                    contentAsHTML: true,
                    contentCloning: true,
                    interactive: true,
                    content: $tooltipContent,
                    trigger: 'click',
                    // offsetX: offsetXvalue,
                    offsetY: 0,
                    functionReady: function(origin, tooltip) {
                      currentJoint = $(origin);
                      currentJointID = $(origin).attr('id');
                      // console.log(currentJointID);
                    }
                });


                $(document).on('click', '#joint-condition a', function(){
                  // currentJoint = currentJoint.prop('id');
                  selectedState = $(this).attr('id');
                  // console.log('joint "' + currentJointID + '" is ' + selectedState);
                  currentClasses = currentJoint.attr('class');
                  // console.log(currentClasses);
                  if(currentClasses.indexOf("das28") >= 0){
                    currentJoint.attr("class", "joint das28 " + selectedState);
                  }
                  else{
                    currentJoint.attr("class", "joint " + selectedState);
                  }
                  // console.log( currentJoint );
                  $('.joint').tooltipster('hide');

                  var swollenJointIDs = $(".joint.swollen") // find joints
                    .map(function() { return this.id; }) // convert to set of IDs
                    .get(); // convert to instance of Array (optional)

                  var tenderJointIDs = $(".joint.tender") // find joints
                    .map(function() { return this.id; }) // convert to set of IDs
                    .get(); // convert to instance of Array (optional)

                  var tenderswollenJointIDs = $(".joint.tenderswollen")   
                    .map(function() { return this.id; }) 
                    .get();

                  // count number of tender and swollen joints
                  var swollenCount = $('.joint.swollen').length;
                  var tenderCount = $('.joint.tender').length;
                  var tenderswollenCount = $('.joint.tenderswollen').length;
                  var swollen28Count = $('.joint.swollen.das28').length;
                  var tender28Count = $('.joint.tender.das28').length;
                  var tenderswollen28Count = $('.joint.tenderswollen.das28').length;
                  swollenCount += tenderswollenCount;
                  tenderCount += tenderswollenCount;
                  swollen28Count += tenderswollen28Count;
                  tender28Count += tenderswollen28Count;
                  // send counts to parent window function
                  window.top.populateJointScores(tenderCount, swollenCount, tender28Count, swollen28Count, swollenJointIDs, tenderJointIDs, tenderswollenJointIDs);

                  return false;
                }); 


            });

        </script>
